<!DOCTYPE html>
<html lang="fr" data-theme="">
<head>
<meta charset="UTF-8">
<script>(function(){var t=localStorage.getItem('theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Page introuvable — CoutSalarie.fr</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#1D4ED8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-err:#1D4ED8;--blue-err-l:#EFF6FF;
  --gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-400:#9CA3AF;
  --gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;
  --white:#FFFFFF;--body-bg:#dde6ef;--radius:14px;--radius-sm:8px;
  --font-main:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
}
/* Gray tokens only — NEVER --blue-err-l */
[data-theme="dark"]{--body-bg:#080e18;--white:#0f172a;--gray-100:#313c4a;--gray-200:#3e4a5a;--gray-400:#7a8798;--gray-500:#b8c2cf;--gray-700:#d6dde6;--gray-900:#ffffff}
body{font-family:var(--font-main);background:var(--body-bg);color:var(--gray-900);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.card{background:var(--white);border-radius:var(--radius);box-shadow:0 1px 2px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);padding:48px 40px;max-width:480px;width:100%}
[data-theme="dark"] .card{background:var(--white);border:1px solid var(--gray-200)}
.error-code{font-size:72px;font-weight:800;color:var(--blue);line-height:1;margin-bottom:8px}
.error-title{font-size:22px;font-weight:700;margin-bottom:12px}
.error-desc{font-size:14px;color:var(--gray-500);line-height:1.6;margin-bottom:28px}
.btn-home{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--blue);color:#fff;border-radius:var(--radius-sm);font-size:14px;font-weight:700;text-decoration:none;transition:opacity 150ms}
.btn-home:hover{opacity:.88}
.divider{width:48px;height:3px;background:var(--blue-err-l);border-radius:2px;margin:20px auto}
/* Theme toggle */
.theme-toggle{position:fixed;top:16px;right:16px;width:40px;height:40px;border-radius:50%;border:1.5px solid var(--gray-200);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.10);transition:all .2s;z-index:1000}
.theme-toggle:hover{border-color:var(--blue);transform:scale(1.08)}
[data-theme="dark"] .theme-toggle{background:#1e2a3a;border-color:#3e4a5a}
.ui-icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.ui-icon img{display:block;width:16px;height:16px}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:4px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Basculer le mode sombre">
  <span id="themeIcon" class="ui-icon" data-icon="theme-dark.svg" aria-hidden="true"></span>
</button>

<div class="card">
  <div class="error-code">404</div>
  <div class="divider"></div>
  <h1 class="error-title">Page introuvable</h1>
  <p class="error-desc">La page que vous cherchez n'existe pas ou a été déplacée. Retournez au calculateur TVA pour effectuer vos calculs HT/TTC.</p>
  <a href="/" class="btn-home">Retour au calculateur CoutSalarie</a>
</div>

<script>
var ICONS = {
  'theme-dark.svg':  'assets/icons/theme-dark.svg',
  'theme-light.svg': 'assets/icons/theme-light.svg'
};

function hydrateIcons() {
  document.querySelectorAll('[data-icon]').forEach(function(el) {
    var name = el.getAttribute('data-icon');
    var path = ICONS[name];
    if (!path) return;
    el.innerHTML = '<img src="' + path + '" alt="" width="16" height="16" aria-hidden="true">';
  });
}

function updateThemeIcon() {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  var icon = document.getElementById('themeIcon');
  if (!icon) return;
  icon.setAttribute('data-icon', dark ? 'theme-light.svg' : 'theme-dark.svg');
  hydrateIcons();
}

function toggleTheme() {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? '' : 'dark');
  localStorage.setItem('theme', dark ? 'light' : 'dark');
  updateThemeIcon();
}

document.addEventListener('DOMContentLoaded', function() {
  updateThemeIcon();
  hydrateIcons();
});
</script>
</body>
</html>
